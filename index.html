<style>
    /* --- GLOBAL SETUP --- */
    * { box-sizing: border-box; }
    body {
        background-color: #05000a;
        color: #fff;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }

    .main-wrapper { 
        width: 95%; 
        max-width: 1400px; 
    }

    /* --- FADE GALLERY SYSTEM --- */
    .gallery-container {
        position: relative;
        width: 100%;
        height: 650px; 
        margin-bottom: 30px;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #222;
    }

    .slide {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0;
        transition: opacity 1.2s ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    .slide.active { opacity: 1; pointer-events: auto; }
    .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* --- PLAYER WIDGET --- */
    .player-widget {
        background: #11001a;
        border: 1px solid #222;
        border-radius: 20px;
        padding: 25px;
    }

    .now-playing-row {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
        flex-wrap: wrap; /* Allows wrapping on small screens */
    }

    #playerTrackThumb {
        width: 80px; height: 80px;
        border-radius: 12px; object-fit: cover;
    }

    .track-meta { flex: 1; min-width: 150px; }
    .track-name { font-weight: bold; font-size: 24px; margin: 4px 0; }

    .button-group { 
        display: flex; 
        gap: 12px; 
    }

    .action-btn {
        background: #ff00ff; border: none; color: white;
        width: 50px; height: 50px; border-radius: 12px;
        cursor: pointer; font-size: 20px;
        display: flex; align-items: center; justify-content: center;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 600px) {
        .gallery-container {
            height: 350px; /* Smaller gallery for phones */
        }
        
        .now-playing-row {
            justify-content: center;
            text-align: center;
        }

        .track-meta {
            width: 100%; /* Force text to its own line */
            margin-bottom: 10px;
        }

        .button-group {
            width: 100%;
            justify-content: center; /* Center buttons on mobile */
        }

        .heart-container {
            bottom: 15px;
            right: 15px;
            padding: 8px 14px;
            font-size: 14px;
        }
    }

    /* Reuse existing styles for Progress Bar, Arrows, and Heart (omitted for brevity) */
</style>

<body>
<div class="main-wrapper">
    <div class="gallery-container">
        <button class="nav-arrow prev-btn" onclick="changeSlide(-1)">❮</button>
        <button class="nav-arrow next-btn" onclick="changeSlide(1)">❯</button>
        
        <div class="fade-wrapper">
            <div class="slide active">
                <img src="img1.png">
                <div class="heart-container" onclick="toggleLike(this)">
                    <i class="far fa-heart"></i> <span>1,876</span>
                </div>
            </div>
            <div class="slide"><img src="img2.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,777</span></div></div>
            <div class="slide"><img src="img3.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,773</span></div></div>
            <div class="slide"><img src="img4.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,866</span></div></div>
            <div class="slide"><img src="img5.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,792</span></div></div>
        </div>
    </div>

    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label" style="color:#ff00ff; font-size:10px; letter-spacing:2px;">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div style="color: #888;">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>
        <!-- Progress bar and Playlist remain the same as previous version -->
    </div>
</div>
</body>
