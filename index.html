<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GLOBAL SETUP --- */
        * { box-sizing: border-box; }
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .main-wrapper { 
            width: 95%; 
            max-width: 1400px; 
        }

        /* --- FADE GALLERY SYSTEM --- */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 650px; 
            margin-bottom: 30px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .fade-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        /* NAVIGATION */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 0, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 15px 22px;
            cursor: pointer;
            z-index: 50;
            border-radius: 50%;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            font-size: 20px;
        }
        .nav-arrow:hover { background: #ff00ff; box-shadow: 0 0 25px #ff00ff; border-color: #fff; }
        .prev-btn { left: 25px; }
        .next-btn { right: 25px; }

        /* UNIQUE HEART COUNTER */
        .heart-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1.5px solid #444;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 60;
            font-size: 18px;
        }

        .liked {
            color: #ff00ff !important;
            border-color: #ff00ff !important;
            text-shadow: 0 0 15px #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }

        /* PLAYER WIDGET */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 35px;
        }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap; /* Prevents overlap like in your screenshot */
        }

        #playerTrackThumb {
            width: 100px; height: 100px;
            border-radius: 12px; object-fit: cover; flex-shrink: 0;
        }

        .track-meta { flex: 1; min-width: 200px; }
        .status-label { font-size: 12px; color: #ff00ff; text-transform: uppercase; letter-spacing: 2px; }
        .track-name { font-weight: bold; font-size: 28px; margin: 4px 0; }

        .button-group { display: flex; gap: 15px; }
        .action-btn {
            background: #ff00ff; border: none; color: white;
            width: 55px; height: 55px; border-radius: 15px;
            cursor: pointer; font-size: 22px; display: flex;
            align-items: center; justify-content: center;
        }

        /* PROGRESS AREA */
        .progress-area { margin-bottom: 30px; }
        .progress-track {
            width: 100%; height: 8px; background: #2a1436;
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%; background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 14px; color: #777; margin-top: 10px; font-family: monospace;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="gallery-container">
        <button class="nav-arrow prev-btn" onclick="changeSlide(-1)">❮</button>
        <button class="nav-arrow next-btn" onclick="changeSlide(1)">❯</button>
        
        <div class="fade-wrapper">
            <div class="slide active">
                <img src="img1.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,876</span></div>
            </div>
            <div class="slide">
                <img src="img2.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,777</span></div>
            </div>
            <div class="slide">
                <img src="img3.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,773</span></div>
            </div>
            <div class="slide">
                <img src="img4.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,866</span></div>
            </div>
            <div class="slide">
                <img src="img5.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,792</span></div>
            </div>
        </div>
    </div>

    <!-- PLAYER WIDGET -->
    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name" style="color: #888; font-size: 18px;">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<script>
    let slideIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function changeSlide(n) {
        slides[slideIndex].classList.remove('active');
        slideIndex = (slideIndex + n + slides.length) % slides.length;
        slides[slideIndex].classList.add('active');
    }

    setInterval(() => changeSlide(1), 7000);

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
        }
    }

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seek(e) {
        const width = document.getElementById('progressTrack').clientWidth;
        audio.currentTime = (e.offsetX / width) * audio.duration;
    }

    function toggleLike(element) {
        const icon = element.querySelector('i');
        const countSpan = element.querySelector('span');
        let count = parseInt(countSpan.innerText.replace(',', ''));

        element.classList.toggle('liked');

        if (element.classList.contains('liked')) {
            icon.classList.replace('far', 'fas');
            count++;
        } else {
            icon.classList.replace('fas', 'far');
            count--;
        }
        countSpan.innerText = count.toLocaleString();
    }
</script>

</body>
</html>
