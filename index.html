<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS: LAYOUT & INTERACTIVE STYLES --- */
        * { box-sizing: border-box; }
        
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-wrapper { width: 100%; max-width: 800px; }

        /* TOP IMAGE SECTION */
        .image-box {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        #mainImage {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        /* LIKE BUTTON STYLING */
        .heart-container, .p-stats {
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
        }

        .heart-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 16px;
            border-radius: 25px;
            border: 1.5px solid #444; /* Dimmed when not liked */
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
        }

        /* THE "LIT UP" PURPLE STATE */
        .liked {
            color: #ff00ff !important;
            border-color: #ff00ff !important;
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        /* PLAYER WIDGET */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
        }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #playerTrackThumb {
            width: 75px; height: 75px;
            border-radius: 10px; object-fit: cover;
            flex-shrink: 0;
        }

        .track-meta { flex: 1; }
        .status-label { font-size: 11px; color: #ff00ff; text-transform: uppercase; }
        .track-name { font-weight: bold; font-size: 22px; margin: 4px 0; }
        .artist-name { color: #888; font-size: 16px; }

        .button-group { display: flex; gap: 12px; }
        .action-btn {
            background: #ff00ff; border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }

        /* PROGRESS BAR */
        .progress-area { margin-bottom: 25px; }
        .progress-track {
            width: 100%; height: 6px; background: #2a1436;
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%; background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #777; margin-top: 8px;
        }

        /* PLAYLIST */
        .playlist-row {
            display: flex; align-items: center; gap: 15px;
            padding-top: 15px; border-top: 1px solid #222;
        }
        .p-thumb {
            width: 50px !important; height: 50px !important;
            border-radius: 6px; object-fit: cover; flex-shrink: 0;
        }
        .p-info { flex: 1; }
        .p-stats {
            font-size: 14px;
            min-width: 80px;
            text-align: right;
            color: #888; /* Initial state */
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- MAIN IMAGE & HEART -->
    <div class="image-box">
        <img id="mainImage" src="img1.png" alt="Neon Byte">
        <div class="heart-container" onclick="handleLike(this, 'main')">
            <i class="far fa-heart"></i>
            <span id="mainCount">1149</span>
        </div>
    </div>

    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <!-- PROGRESS -->
        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- PLAYLIST HEART -->
        <div class="playlist-row">
            <img class="p-thumb" src="img1.png">
            <div class="p-info">
                <div class="p-title">dream.exe</div>
                <div class="p-artist" style="font-size: 12px; color: #666;">Neon Byte</div>
            </div>
            <div class="p-stats" onclick="handleLike(this, 'playlist')">
                <i class="far fa-heart"></i> <span id="playlistCount">1175</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressTrack = document.getElementById('progressTrack');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    /* --- AUDIO LOGIC --- */
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
        }
    }

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seek(e) {
        const width = progressTrack.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    }

    /* --- LIKE LOGIC (THE FIX) --- */
    function handleLike(element, type) {
        const icon = element.querySelector('i');
        const countSpan = element.querySelector('span');
        let currentCount = parseInt(countSpan.innerText.replace(',', ''));

        // Toggle the "liked" class for color and glow
        element.classList.toggle('liked');

        if (element.classList.contains('liked')) {
            // Liked: Solid heart + add 1
            icon.classList.replace('far', 'fas');
            currentCount++;
        } else {
            // Unliked: Regular heart - subtract 1
            icon.classList.replace('fas', 'far');
            currentCount--;
        }

        // Update the text with a comma for the thousands
        countSpan.innerText = currentCount.toLocaleString();
    }
</script>

</body>
</html>
