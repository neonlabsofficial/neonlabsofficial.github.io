<div class="player-widget">
    <div class="now-playing-section">
        <div class="track-thumb-container">
            <img id="playerTrackThumb" src="img1.png" alt="Thumbnail">
        </div>

        <div class="track-data-layout">
            <div class="track-data-top">
                <div class="track-info-titles">
                    <span class="now-playing-indicator"><span class="purple-dot"></span> NOW PLAYING</span>
                    <div class="player-track-title">dream.exe</div>
                    <div class="player-track-artist">Neon Labs</div>
                </div>
                <div class="player-controls-group">
                    <button class="player-control-btn" id="playBtn" onclick="togglePlay()">▶</button>
                    <button class="player-mini-btn" onclick="downloadTrack()" title="Download Song">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>

            <div class="waveform-progress-data">
                <div class="player-waveform" id="visualizer"></div>
                <div class="player-progress-detailed">
                    <span id="currentTime">0:00</span>
                    <div class="player-progress-track" id="progressTrack">
                        <div class="player-progress-bar-filled" id="progressBar"></div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYLIST SECTION -->
    <div class="playlist-section">
        <div class="playlist-item active-track">
            <img class="p-thumb" src="img1.png" alt="thumb">
            <div class="p-row-content">
                <span class="p-title active-color">dream.exe</span>
                <span class="p-artist grey-color">Neon Labs</span>
                <span class="p-duration grey-color" id="playlistDuration">0:00</span>
                <div class="song-heart-btn" onclick="likeSong('dream.exe')">
                    <i class="far fa-heart" id="heart-dream.exe"></i>
                    <span id="count-dream.exe">0</span>
                </div>
            </div>
        </div>
    </div>
</div>
