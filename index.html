<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <!-- TOP SECTION: MAIN IMAGE & PINNED COUNTER -->
    <div class="image-box">
        <img id="mainImage" src="img1.png" alt="Neon Byte Group">
        <div class="heart-container">
            <i class="far fa-heart"></i>
            <span id="imageHeartCount">1,149</span>
        </div>
    </div>

    <!-- MIDDLE SECTION: THE PLAYER -->
    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png" alt="Thumbnail">
            
            <div class="track-meta">
                <div class="status-label"><span class="dot"></span> NOW PLAYING</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name">Neon Byte</div>
            </div>

            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn mini"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <!-- PROGRESS & TIMER -->
        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- BOTTOM SECTION: PLAYLIST ITEM -->
        <div class="playlist-row">
            <img class="p-thumb" src="img1.png" alt="Small Thumbnail">
            <div class="p-info">
                <span class="p-title">dream.exe</span>
                <span class="p-artist">Neon Byte</span>
            </div>
            <div class="p-stats">
                <i class="far fa-heart"></i> 1,175
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressTrack = document.getElementById('progressTrack');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = pct + "%";
        currentTimeEl.innerText = formatTime(audio.currentTime);
    };

    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seek(e) {
        const width = progressTrack.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    }
</script>

</body>
</html>
