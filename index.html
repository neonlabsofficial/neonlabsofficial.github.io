<!DOCTYPE html>
<html>
<head>
    <title>Neon Labs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDE ARROWS -->
<button class="nav-arrow left" onclick="goBack()">❮</button>
<button class="nav-arrow right" onclick="nextGroup()">❯</button>

<div class="container">

    <!-- IMAGE -->
    <div class="image-box">
        <img id="mainImage" src="img1.png">

        <div class="heart-container" onclick="likeImage()">
            <span id="heartIcon">♡</span>
            <span id="heartCount">0</span>
        </div>
    </div>

    <!-- MUSIC -->
   <div class="music-player">

    <!-- LEFT: ICON -->
    <img class="track-icon" src="img1.png">

    <!-- MIDDLE: INFO -->
    <div class="track-info">
        <div class="track-title">dream.exe</div>
        <div class="track-artist">Neon Labs</div>

        <!-- WAVEFORM -->
        <div class="waveform">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- PROGRESS -->
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- RIGHT CONTROLS -->
    <div class="controls">
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="downloadTrack()">⬇</button>
    </div>

    <audio id="audio" src="dream.exe.mp3"></audio>
</div>
    
<script src="script.js"></script>
</body>
</html>
