<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 1. CSS: LAYOUT & ANIMATION --- */
        * { box-sizing: border-box; }
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-wrapper { width: 100%; max-width: 800px; }

        /* --- THE SCROLLING GALLERY --- */
        .gallery-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden; /* Clips the images */
            border-radius: 15px;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .slide {
            min-width: 100%; /* Each image takes full width */
            flex-shrink: 0;
        }

        .slide img {
            width: 100%;
            display: block;
            object-fit: cover;
            aspect-ratio: 16 / 9; /* Ensures landscape orientation as requested */
        }

        /* NAVIGATION ARROWS */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            transition: background 0.3s;
        }
        .nav-arrow:hover { background: #ff00ff; }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* PINNED HEART ON GALLERY */
        .heart-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 16px;
            border-radius: 25px;
            border: 1.5px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            z-index: 15;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* PLAYER & PLAYLIST */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
        }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #playerTrackThumb {
            width: 75px; height: 75px;
            border-radius: 10px; object-fit: cover; flex-shrink: 0;
        }

        .track-meta { flex: 1; }
        .status-label { font-size: 11px; color: #ff00ff; text-transform: uppercase; }
        .track-name { font-weight: bold; font-size: 22px; margin: 4px 0; }

        .button-group { display: flex; gap: 12px; }
        .action-btn {
            background: #ff00ff; border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center;
        }

        /* PROGRESS AREA */
        .progress-area { margin-bottom: 25px; }
        .progress-track {
            width: 100%; height: 6px; background: #2a1436;
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%; background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #777; margin-top: 8px; font-family: monospace;
        }

        /* PLAYLIST FIX */
        .playlist-row {
            display: flex; align-items: center; gap: 15px;
            padding-top: 15px; border-top: 1px solid #222;
        }
        .p-thumb {
            width: 50px !important; height: 50px !important;
            border-radius: 6px; object-fit: cover; flex-shrink: 0;
        }
        .p-info { flex: 1; }
        .p-stats {
            font-size: 14px; min-width: 80px; text-align: right; color: #888;
            cursor: pointer;
        }

        /* THE PURPLE "LIT" STATE */
        .liked {
            color: #ff00ff !important;
            border-color: #ff00ff !important;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 2. HTML: THE GALLERY & PLAYER -->
    <div class="gallery-container">
        <button class="nav-arrow prev-btn" onclick="moveSlide(-1)">❮</button>
        <button class="nav-arrow next-btn" onclick="moveSlide(1)">❯</button>
        
        <div class="slider-wrapper" id="slider">
            <div class="slide"><img src="img1.png" alt="Neon Byte 1"></div>
            <div class="slide"><img src="img2.png" alt="Neon Byte 2"></div>
            <div class="slide"><img src="img3.png" alt="Neon Byte 3"></div>
        </div>

        <div class="heart-container" onclick="toggleLike(this, 'main')">
            <i class="far fa-heart"></i>
            <span id="mainCount">1149</span>
        </div>
    </div>

    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name" style="color: #888;">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="playlist-row">
            <img class="p-thumb" src="img1.png">
            <div class="p-info">
                <div class="p-title">dream.exe</div>
                <div style="font-size: 12px; color: #666;">Neon Byte</div>
            </div>
            <div class="p-stats" onclick="toggleLike(this, 'playlist')">
                <i class="far fa-heart"></i> <span id="playlistCount">1175</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<!-- 3. JAVASCRIPT: THE ALIGNED LOGIC -->
<script>
    /* SLIDER LOGIC */
    let currentSlide = 0;
    const slider = document.getElementById('slider');
    const totalSlides = document.querySelectorAll('.slide').length;

    function moveSlide(direction) {
        currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
        slider.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    // Auto-scroll every 5 seconds
    setInterval(() => moveSlide(1), 5000);

    /* AUDIO LOGIC */
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
        }
    }

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seek(e) {
        const width = document.getElementById('progressTrack').clientWidth;
        audio.currentTime = (e.offsetX / width) * audio.duration;
    }

    /* LIKE LOGIC (PURPLE LIGHT-UP) */
    function toggleLike(element, type) {
        const icon = element.querySelector('i');
        const countSpan = element.querySelector('span');
        let count = parseInt(countSpan.innerText.replace(',', ''));

        element.classList.toggle('liked');

        if (element.classList.contains('liked')) {
            icon.classList.replace('far', 'fas');
            count++;
        } else {
            icon.classList.replace('fas', 'far');
            count--;
        }
        countSpan.innerText = count.toLocaleString();
    }
</script>

</body>
</html>
