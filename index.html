<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GLOBAL SETUP --- */
        * { box-sizing: border-box; }
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .main-wrapper { width: 100%; max-width: 800px; }

        /* --- FADE GALLERY SYSTEM --- */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 450px; /* Adjust height based on your landscape preference */
            margin-bottom: 25px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }

        .fade-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out; /* Expert fade timing */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Ensures images are displayed in full without cropping */
        }

        /* NAVIGATION */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 0, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 0, 255, 0.5);
            padding: 12px 18px;
            cursor: pointer;
            z-index: 20;
            border-radius: 50%;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .nav-arrow:hover { background: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        /* PINNED HEART COUNTER */
        .heart-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 25px;
            border: 1.5px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            z-index: 30;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* PLAYER WIDGET (HORIZONTAL ALIGNMENT) */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
        }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #playerTrackThumb {
            width: 75px; height: 75px;
            border-radius: 10px; object-fit: cover; flex-shrink: 0;
        }

        .track-meta { flex: 1; }
        .status-label { font-size: 10px; color: #ff00ff; text-transform: uppercase; letter-spacing: 1.5px; }
        .track-name { font-weight: bold; font-size: 22px; margin: 4px 0; }

        .button-group { display: flex; gap: 12px; }
        .action-btn {
            background: #ff00ff; border: none; color: white;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center;
        }

        /* PROGRESS AREA */
        .progress-area { margin-bottom: 25px; }
        .progress-track {
            width: 100%; height: 6px; background: #2a1436;
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%; background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #777; margin-top: 8px; font-family: monospace;
        }

        /* PLAYLIST THUMBNAILS (FIXED SMALL) */
        .playlist-row {
            display: flex; align-items: center; gap: 15px;
            padding-top: 15px; border-top: 1px solid #222;
        }
        .p-thumb {
            width: 50px !important; height: 50px !important;
            border-radius: 6px; object-fit: cover; flex-shrink: 0;
        }
        .p-info { flex: 1; }
        .p-stats {
            font-size: 14px; min-width: 80px; text-align: right; color: #888;
            cursor: pointer; transition: 0.3s;
        }

        /* LIGHT-UP STATE */
        .liked {
            color: #ff00ff !important;
            border-color: #ff00ff !important;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- FADE GALLERY (5 IMAGES) -->
    <div class="gallery-container">
        <button class="nav-arrow prev-btn" onclick="changeSlide(-1)">❮</button>
        <button class="nav-arrow next-btn" onclick="changeSlide(1)">❯</button>
        
        <div class="fade-wrapper" id="gallery">
            <div class="slide active"><img src="img1.png"></div>
            <div class="slide"><img src="img2.png"></div>
            <div class="slide"><img src="img3.png"></div>
            <div class="slide"><img src="img4.png"></div>
            <div class="slide"><img src="img5.png"></div>
        </div>

        <div class="heart-container" onclick="toggleLike(this)">
            <i class="far fa-heart"></i>
            <span id="mainCount">1,149</span>
        </div>
    </div>

    <div class="player-widget">
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name" style="color: #888;">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="playlist-row">
            <img class="p-thumb" src="img1.png">
            <div class="p-info">
                <div class="p-title">dream.exe</div>
                <div style="font-size: 12px; color: #666;">Neon Byte</div>
            </div>
            <div class="p-stats" onclick="toggleLike(this)">
                <i class="far fa-heart"></i> <span>1,175</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<script>
    /* 1. FADE GALLERY LOGIC */
    let slideIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function changeSlide(n) {
        slides[slideIndex].classList.remove('active');
        slideIndex = (slideIndex + n + slides.length) % slides.length;
        slides[slideIndex].classList.add('active');
    }

    // Auto-fade every 6 seconds
    setInterval(() => changeSlide(1), 6000);

    /* 2. PLAYER LOGIC */
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
        }
    }

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function seek(e) {
        const width = document.getElementById('progressTrack').clientWidth;
        audio.currentTime = (e.offsetX / width) * audio.duration;
    }

    /* 3. LIKE SYSTEM (PURPLE LIGHT-UP) */
    function toggleLike(element) {
        const icon = element.querySelector('i');
        const countSpan = element.querySelector('span');
        let count = parseInt(countSpan.innerText.replace(',', ''));

        element.classList.toggle('liked');

        if (element.classList.contains('liked')) {
            icon.classList.replace('far', 'fas');
            count++;
        } else {
            icon.classList.replace('fas', 'far');
            count--;
        }
        countSpan.innerText = count.toLocaleString();
    }
</script>

</body>
</html>
