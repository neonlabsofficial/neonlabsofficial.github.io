<!DOCTYPE html>
<html>
<head>
    <title>Neon Labs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- BIG SIDE ARROWS -->
    <button class="nav-arrow left">❮</button>
    <button class="nav-arrow right" onclick="nextGroup()">❯</button>

    <!-- IMAGE -->
    <div class="image-box">
        <img id="mainImage" src="img1.jpg">

        <div class="heart-container" onclick="likeImage()">
            <span id="heartIcon">♡</span>
            <span id="heartCount">0</span>
        </div>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="songs">
        <audio controls src="dream.exe.mp3"></audio>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
