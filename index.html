<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Labs Player</title>
    <!-- Font Awesome for detailed icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDE ARROWS (Original functionality retained) -->
    <button class="page-nav-arrow left" onclick="goBack()">❮</button>
    <button class="page-nav-arrow right" onclick="nextGroup()">❯</button>

    <div class="container">
        <!-- LARGE IMAGE SHOWCASE (Original slideshow logic retained) -->
        <div class="image-box">
            <img id="mainImage" src="img1.png" alt="Cover Art">
            <div class="heart-container" onclick="likeImage()">
                <span id="heartIcon">♡</span>
                <span id="heartCount">0</span>
            </div>
        </div>

        <!-- NEW PLAYER WIDGET (Image Inspired) -->
        <div class="player-widget">

            <!-- Top: Now Playing Section -->
            <div class="now-playing-section">
                <!-- Left: Square Thumbnail (linked to main slideshow logic) -->
                <div class="track-thumb-container">
                    <img id="playerTrackThumb" src="img1.png" alt="Track Thumbnail">
                </div>

                <!-- Middle: Track Details, Waveform, Progress -->
                <div class="track-data-layout">
                    <div class="track-data-top">
                        <div class="track-info-titles">
                            <span class="now-playing-indicator"><span class="purple-dot"></span> NOW PLAYING</span>
                            <div class="player-track-title" id="playerTitle">dream.exe</div>
                            <div class="player-track-artist" id="playerArtist">Neon Labs</div>
                        </div>
                        <!-- Circular Pause Button (Fars Right) -->
                        <button class="player-control-btn play-pause-btn" id="playBtn" onclick="togglePlay()">⏸</button>
                    </div>

                    <!-- Waveform and Progress Bar -->
                    <div class="waveform-progress-data">
                        <div class="player-waveform" id="playerWaveform">
                            <!-- Many more spans for a detailed look -->
                            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        </div>

                        <div class="player-progress-detailed">
                            <span class="current-time" id="currentTime">1:23</span>
                            <div class="player-progress-track">
                                <div class="player-progress-bar-filled" id="progressBar"></div>
                                <div class="player-progress-thumb"></div>
                            </div>
                            <span class="total-time" id="totalTime">3:47</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom: Playlist Section -->
            <div class="playlist-section">
                <!-- Top Bar: Download and Menu -->
                <div class="playlist-header">
                    <div class="download-trigger" onclick="downloadTrack()">
                        <i class="fas fa-download purple-download-icon"></i>
                        <span class="purple-download-text">DOWNLOAD</span>
                    </div>
                    <button class="playlist-top-menu-btn"><i class="fas fa-ellipsis-v grey-menu-icon"></i></button>
                </div>

                <!-- Detailed Playlist Items -->
                <div class="playlist-item-list" id="playlistList">
                    <!-- Tracks can be added/generated here, but hardcoding for style check -->
                    <div class="playlist-item active-track">
                        <img class="p-thumb" src="img1.png" alt="thumb">
                        <i class="fas fa-bars-staggered purple-track-icon"></i>
                        <span class="p-title active-color">dream.exe</span>
                        <span class="p-artist grey-color">Neon Labs</span>
                        <span class="p-duration grey-color">3:47</span>
                        <button class="p-item-menu"><i class="fas fa-ellipsis-v grey-menu-icon"></i></button>
                    </div>
                    <div class="playlist-item">
                        <img class="p-thumb" src="img2.png" alt="thumb">
                        <span class="p-title grey-title-color">midnight.wav</span>
                        <span class="p-artist grey-color">Neon Labs</span>
                        <span class="p-duration grey-color">4:02</span>
                        <button class="p-item-menu"><i class="fas fa-ellipsis-v grey-menu-icon"></i></button>
                    </div>
                    <div class="playlist-item">
                        <img class="p-thumb" src="img3.png" alt="thumb">
                        <span class="p-title grey-title-color">ghost.txt</span>
                        <span class="p-artist grey-color">Neon Labs</span>
                        <span class="p-duration grey-color">2:58</span>
                        <button class="p-item-menu"><i class="fas fa-ellipsis-v grey-menu-icon"></i></button>
                    </div>
                </div>
            </div>

        </div> <!-- End player-widget -->
    </div> <!-- End main container -->

    <audio id="audio" src="dream.exe.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
