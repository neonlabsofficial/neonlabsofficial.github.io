<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media Player</title>
    <!-- Font Awesome for the Heart and Download Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- 1. CSS: THE LAYOUT ENGINE --- */
        * { box-sizing: border-box; }
        
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 800px;
        }

        /* PINNED HEART COUNTER FIX */
        .image-box {
            position: relative; /* Essential for the absolute heart to stay inside */
            width: 100%;
            margin-bottom: 25px;
        }

        #mainImage {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        .heart-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 16px;
            border-radius: 25px;
            border: 1.5px solid #ff00ff;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff00ff;
            font-weight: bold;
        }

        /* PLAYER WIDGET: FIXES VERTICAL STACKING */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .now-playing-row {
            display: flex; /* Forces Horizontal Layout */
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #playerTrackThumb {
            width: 75px;
            height: 75px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0; /* Prevents image from squishing or growing */
        }

        .track-meta {
            flex: 1; /* Takes up all available middle space */
        }

        .status-label {
            font-size: 11px;
            color: #ff00ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .track-name { font-weight: bold; font-size: 22px; margin: 4px 0; }
        .artist-name { color: #888; font-size: 16px; }

        /* BUTTON ALIGNMENT */
        .button-group {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .action-btn {
            background: #ff00ff;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.9); }

        /* PROGRESS BAR & TIMER ALIGNMENT */
        .progress-area { margin-bottom: 25px; }
        
        .progress-track {
            width: 100%;
            height: 6px;
            background: #2a1436;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%; /* Controlled by JavaScript */
            height: 100%;
            background: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #777;
            margin-top: 8px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* PLAYLIST THUMBNAIL SIZE FIX */
        .playlist-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
        }

        .p-thumb {
            width: 50px !important; /* Fixed small size */
            height: 50px !important;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0; /* Critical: Stops image from expanding */
        }

        .p-info { flex: 1; }
        .p-title { font-size: 16px; font-weight: 500; color: #fff; }
        .p-artist { font-size: 13px; color: #666; }

        .p-stats {
            color: #ff00ff;
            font-size: 14px;
            min-width: 80px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 2. HTML: THE STRUCTURE -->
    <div class="image-box">
        <img id="mainImage" src="img1.png" alt="Neon Byte Main">
        <div class="heart-container">
            <i class="far fa-heart"></i>
            <span>1,149</span>
        </div>
    </div>

    <div class="player-widget">
        <!-- Now Playing Section -->
        <div class="now-playing-row">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-meta">
                <div class="status-label">Now Playing</div>
                <div class="track-name">dream.exe</div>
                <div class="artist-name">Neon Byte</div>
            </div>
            <div class="button-group">
                <button class="action-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="action-btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <!-- Progress and Timer Section -->
        <div class="progress-area">
            <div class="progress-track" id="progressTrack" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Playlist Row -->
        <div class="playlist-row">
            <img class="p-thumb" src="img1.png">
            <div class="p-info">
                <div class="p-title">dream.exe</div>
                <div class="p-artist">Neon Byte</div>
            </div>
            <div class="p-stats">
                <i class="far fa-heart"></i> 1,175
            </div>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<!-- 3. JAVASCRIPT: THE LOGIC -->
<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressTrack = document.getElementById('progressTrack');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    // Play/Pause Function
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
        }
    }

    // Update Progress Bar and Timer as song plays
    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    };

    // Load total duration when audio file is ready
    audio.onloadedmetadata = () => {
        totalTimeEl.innerText = formatTime(audio.duration);
    };

    // Helper to turn seconds into 0:00 format
    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    // Click on progress bar to skip to that part of the song
    function seek(e) {
        const width = progressTrack.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    }
</script>

</body>
</html>
