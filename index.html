<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Byte | Media Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #05000a;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-wrapper { width: 95%; max-width: 1400px; }

        /* --- GALLERY --- */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 600px; 
            margin-bottom: 25px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .slide.active { opacity: 1; pointer-events: auto; }
        .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 0, 255, 0.1); color: #fff; border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 12px 18px; cursor: pointer; z-index: 50; border-radius: 50%; transition: 0.3s;
        }
        .nav-arrow:hover { background: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }

        .heart-container {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 8px 16px;
            border-radius: 25px; border: 1.5px solid #444;
            display: flex; align-items: center; gap: 10px; cursor: pointer; z-index: 60;
        }
        .liked { color: #ff00ff !important; border-color: #ff00ff !important; }

        /* --- PLAYER & VISUALIZER --- */
        .player-widget {
            background: #11001a;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 20px;
        }

        /* Dedicated Visualizer Box */
        .viz-box {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #330044;
            overflow: hidden;
        }

        #particleCanvas { width: 100%; height: 100%; display: block; }

        .now-playing-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #playerTrackThumb { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        
        .track-text { flex: 1; min-width: 180px; }
        .track-name { font-size: 24px; font-weight: bold; margin: 0; }
        .artist-name { color: #888; font-size: 16px; }

        .controls { display: flex; gap: 12px; }
        .btn {
            background: #ff00ff; border: none; color: white;
            width: 50px; height: 50px; border-radius: 12px;
            cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        .progress-bg { width: 100%; height: 6px; background: #2a1436; border-radius: 10px; cursor: pointer; margin-top: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .time-box { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }

        /* MOBILE ADAPTATION */
        @media (max-width: 650px) {
            .gallery-container { height: 350px; }
            .now-playing-info { justify-content: center; text-align: center; }
            .track-text { width: 100%; margin-bottom: 10px; }
            .controls { width: 100%; justify-content: center; }
            .viz-box { height: 80px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Gallery -->
    <div class="gallery-container">
        <button class="nav-arrow prev-btn" onclick="changeSlide(-1)">❮</button>
        <button class="nav-arrow next-btn" onclick="changeSlide(1)">❯</button>
        <div class="fade-wrapper">
            <div class="slide active">
                <img src="img1.png">
                <div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,876</span></div>
            </div>
            <div class="slide"><img src="img2.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,777</span></div></div>
            <div class="slide"><img src="img3.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,773</span></div></div>
            <div class="slide"><img src="img4.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,866</span></div></div>
            <div class="slide"><img src="img5.png"><div class="heart-container" onclick="toggleLike(this)"><i class="far fa-heart"></i> <span>1,792</span></div></div>
        </div>
    </div>

    <!-- Player with Visualizer -->
    <div class="player-widget">
        <div class="viz-box">
            <canvas id="particleCanvas"></canvas>
        </div>

        <div class="now-playing-info">
            <img id="playerTrackThumb" src="img1.png">
            <div class="track-text">
                <div style="color: #ff00ff; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">Now Playing</div>
                <p class="track-name">dream.exe</p>
                <p class="artist-name">Neon Byte</p>
            </div>
            <div class="controls">
                <button class="btn" onclick="togglePlay()" id="playBtn">▶</button>
                <button class="btn"><i class="fas fa-download"></i></button>
            </div>
        </div>

        <div class="progress-bg" onclick="seek(event)">
            <div class="progress-fill" id="progFill"></div>
        </div>
        <div class="time-box">
            <span id="curr">0:00</span>
            <span id="total">0:00</span>
        </div>
    </div>
</div>

<audio id="audio" src="dream.exe.mp3"></audio>

<script>
    // GALLERY
    let sIdx = 0;
    const slides = document.querySelectorAll('.slide');
    function changeSlide(n) {
        slides[sIdx].classList.remove('active');
        sIdx = (sIdx + n + slides.length) % slides.length;
        slides[sIdx].classList.add('active');
    }
    setInterval(() => changeSlide(1), 7000);

    // AUDIO & LIKES
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progFill = document.getElementById('progFill');
    let isPlaying = false;

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            isPlaying = true;
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
            isPlaying = false;
        }
    }

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        progFill.style.width = pct + "%";
        document.getElementById('curr').innerText = format(audio.currentTime);
    };

    audio.onloadedmetadata = () => {
        document.getElementById('total').innerText = format(audio.duration);
    };

    function format(t) {
        const m = Math.floor(t / 60);
        const s = Math.floor(t % 60);
        return m + ":" + (s < 10 ? '0' + s : s);
    }

    function seek(e) {
        const w = e.currentTarget.offsetWidth;
        audio.currentTime = (e.offsetX / w) * audio.duration;
    }

    function toggleLike(el) {
        const icon = el.querySelector('i');
        const span = el.querySelector('span');
        let val = parseInt(span.innerText.replace(',', ''));
        el.classList.toggle('liked');
        if (el.classList.contains('liked')) {
            icon.className = 'fas fa-heart';
            val++;
        } else {
            icon.className = 'far fa-heart';
            val--;
        }
        span.innerText = val.toLocaleString();
    }

    // VISUALIZER LOGIC
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let parts = [];

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.v = Math.random() * 1.5 + 0.5; // Velocity
            this.h = Math.random() > 0.5 ? 290 : 200; // Purple or Cyan
        }
        draw() {
            // Speed up and add "wind" turbulence if playing
            this.x += isPlaying ? this.v * 3 : this.v;
            this.y += Math.sin(this.x / 40) * (isPlaying ? 1.5 : 0.5);

            if (this.x > canvas.width) this.x = -5;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;

            ctx.fillStyle = `hsla(${this.h}, 100%, 70%, 0.5)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) parts.push(new Particle());

    function loop() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Trailing effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        parts.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }
    loop();
</script>

</body>
</html>
